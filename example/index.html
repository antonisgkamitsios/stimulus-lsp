<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stimulus LSP Example</title>
</head>
<body>
    <!-- 
        To test the autocomplete:
        1. Position your cursor after "data-controller-" 
        2. Press Ctrl+Space (or Cmd+Space on Mac)
        3. You should see available controllers:
           - dashboard
           - form-validator
           - admin--users
    -->
    
    <div data-controller-dashboard>
        <h1>Dashboard</h1>
        <p>This div uses the dashboard controller.</p>
    </div>

    <form data-controller-form-validator>
        <input type="text" name="username" placeholder="Username">
        <input type="password" name="password" placeholder="Password">
        <button type="submit">Login</button>
    </form>

    <div data-controller-admin--users>
        <h2>Admin Users</h2>
        <p>This div uses the nested admin--users controller.</p>
    </div>

    <!-- Try typing "data-controller-" below to see autocomplete -->
    <section data-controller->
        <!-- Place your cursor here and press Ctrl+Space -->
    </section>
</body>
</html>
