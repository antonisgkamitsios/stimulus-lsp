name: Publish

on:
  release:
    types: [created]

jobs:
  tests:
    uses: ./.github/workflows/test.yml
  publish:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Build
        uses: ./.github/actions/build

      - name: Compile project
        run: pnpm compile

      - name: Publish
        run: pnpm publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
