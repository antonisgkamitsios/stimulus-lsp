name: Node.js CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build project 
        run: npm run compile
      - name: Test server
        run: |
          cd ./server && npm run test
          ls 
      - name: Checking where i am
        run: ls